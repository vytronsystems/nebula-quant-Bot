global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]

  - job_name: "bot"
    static_configs:
      - targets: ["bot:8080"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
