services:
  postgres:
    image: postgres:16
    container_name: nq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nebula}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nebula123}
      POSTGRES_DB: ${POSTGRES_DB:-trading}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebula -d trading"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [nqnet]

  redis:
    image: redis:7
    container_name: nq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [nqnet]

  grafana:
    image: grafana/grafana:latest
    container_name: nq-grafana
    user: "472:472"
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q '\"database\"'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks: [nqnet]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: nq-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-nebula}:${POSTGRES_PASSWORD:-nebula123}@postgres:5432/${POSTGRES_DB:-trading}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    # HEALTHCHECK REAL: el exporter NO tiene pg_isready dentro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9187/metrics >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks: [nqnet]

  bot:
    build:
      context: ../services/bot
    container_name: nq-bot
    restart: unless-stopped
    environment:
      PG_DSN: "postgresql://${POSTGRES_USER:-nebula}:${POSTGRES_PASSWORD:-nebula123}@postgres:5432/${POSTGRES_DB:-trading}"
      REDIS_HOST: "redis"
      PYTHONPATH: /app
      NQ_ENV: local
      NQ_VERSION: dev
      NQ_SYMBOL: QQQ
      NQ_TIMEFRAME: 5m
      HEARTBEAT_SECONDS: "10"
      SNAPSHOT_EVERY_N_HEARTBEATS: "6"
      METRICS_PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - ../services/bot:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, psycopg, redis; psycopg.connect(os.getenv('PG_DSN')).close(); redis.Redis(host=os.getenv('REDIS_HOST','redis'), port=6379).ping(); print('ok')\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      nqnet:
        aliases:
          - bot
          - nq-bot

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: nq-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    depends_on:
      postgres-exporter:
        condition: service_healthy
      bot:
        condition: service_started
    networks: [nqnet]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: nq-alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    networks: [nqnet]

  binance-api:
    build:
      context: ../services/bot
      dockerfile: Dockerfile.binance-api
    container_name: nq-binance-api
    restart: unless-stopped
    environment:
      PYTHONPATH: /app
      BINANCE_TESTNET: ${BINANCE_TESTNET:-true}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      BINANCE_FUTURES_TESTNET_BASE_URL: ${BINANCE_FUTURES_TESTNET_BASE_URL:-https://testnet.binancefuture.com}
      BINANCE_SYMBOL: ${BINANCE_SYMBOL:-BTCUSDT}
    ports:
      - "8082:8082"
    networks: [nqnet]

  control-plane:
    build:
      context: ../services/control-plane
    container_name: nq-control-plane
    restart: unless-stopped
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: ${POSTGRES_USER:-nebula}
      PG_PASSWORD: ${POSTGRES_PASSWORD:-nebula123}
      PG_DATABASE: ${POSTGRES_DB:-trading}
      BINANCE_API_URL: http://binance-api:8082
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      binance-api:
        condition: service_started
    networks: [nqnet]

  web-ui:
    image: node:20-bookworm-slim
    container_name: nq-web-ui
    working_dir: /app
    volumes:
      - ../apps/web:/app
    ports:
      - "3001:3000"
    command: ["sh", "-c", "npm install && npx next dev -H 0.0.0.0"]
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    networks: [nqnet]

networks:
  nqnet:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  prometheus_data:
  alertmanager_data:
