server:
  port: 8081

spring:
  application:
    name: control-plane
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DATABASE:trading}
    username: ${PG_USER:nebula}
    password: ${PG_PASSWORD:nebula123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
    show-sql: false

binance:
  api:
    url: ${BINANCE_API_URL:http://localhost:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
